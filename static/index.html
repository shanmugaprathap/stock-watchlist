<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Watchlist</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242837;
    --border: #2e3347; --text: #e4e6f0; --text2: #8b8fa3;
    --green: #00c853; --red: #ff1744; --yellow: #ffd600; --teal: #00bfa5;
    --blue: #448aff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; }

  .nifty-strip { background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; align-items: center; gap: 20px;
    flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
  .nifty-strip .label { font-weight: 600; font-size: 14px; }
  .nifty-strip .value { font-size: 18px; font-weight: 700; }
  .nifty-strip .change { font-size: 14px; font-weight: 600; }
  .mood-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .mood-Bullish { background: rgba(0,200,83,0.15); color: var(--green); }
  .mood-Neutral { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .mood-Bearish { background: rgba(255,23,68,0.15); color: var(--red); }

  .market-banner { text-align: center; padding: 6px; font-size: 13px; font-weight: 600; }
  .banner-closed { background: rgba(255,23,68,0.12); color: var(--red); }
  .banner-open { background: rgba(0,200,83,0.12); color: var(--green); }

  .container { max-width: 1400px; margin: 0 auto; padding: 16px; }
  .timestamp { text-align: right; color: var(--text2); font-size: 12px; margin-bottom: 12px; }

  h2 { font-size: 18px; margin: 20px 0 12px; color: var(--text2);
    border-bottom: 1px solid var(--border); padding-bottom: 6px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }

  .card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; transition: border-color 0.2s; }
  .card:hover { border-color: var(--blue); }

  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-symbol { font-size: 16px; font-weight: 700; }
  .card-name { font-size: 12px; color: var(--text2); }

  .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .price { font-size: 22px; font-weight: 700; }
  .change-up { color: var(--green); }
  .change-down { color: var(--red); }
  .change-neutral { color: var(--text2); }

  .signal { display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .signal-strong-buy { background: rgba(0,200,83,0.18); color: var(--green); }
  .signal-good-to-add { background: rgba(0,191,165,0.18); color: var(--teal); }
  .signal-wait { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .signal-avoid { background: rgba(255,23,68,0.18); color: var(--red); }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 12px; }
  .metric { display: flex; justify-content: space-between; }
  .metric-label { color: var(--text2); }
  .metric-value { font-weight: 500; }

  .rsi-green { color: var(--green); }
  .rsi-yellow { color: var(--yellow); }
  .rsi-red { color: var(--red); }

  .pnl-row { margin-top: 8px; padding: 8px; border-radius: 6px;
    font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; }
  .pnl-positive { background: rgba(0,200,83,0.1); color: var(--green); }
  .pnl-negative { background: rgba(255,23,68,0.1); color: var(--red); }

  .sma-above { color: var(--green); }
  .sma-below { color: var(--red); }

  .loading { text-align: center; padding: 60px; color: var(--text2); font-size: 16px; }
  .spinner { display: inline-block; width: 24px; height: 24px;
    border: 3px solid var(--border); border-top-color: var(--blue);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px;
    vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600;
    color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: all 0.2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* MF specific */
  .mf-summary { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px;
    padding: 14px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); }
  .mf-summary-item { text-align: center; }
  .mf-summary-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .mf-summary-value { font-size: 20px; font-weight: 700; }
  .mf-card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .mf-card:hover { border-color: var(--blue); }
  .mf-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .mf-name { font-size: 15px; font-weight: 700; }
  .mf-category { font-size: 11px; color: var(--text2); }
  .mf-metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px; font-size: 12px; }
  .mf-metric { background: var(--surface2); padding: 6px 8px; border-radius: 6px; }
  .mf-metric-label { color: var(--text2); font-size: 10px; text-transform: uppercase; }
  .mf-metric-value { font-weight: 600; font-size: 14px; }
  .signal-deploy-now { background: rgba(0,200,83,0.18); color: var(--green); }
  .signal-good-entry { background: rgba(0,191,165,0.18); color: var(--teal); }
  .signal-sip-only { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .signal-wait-mf { background: rgba(255,23,68,0.18); color: var(--red); }
  .signal-reason { font-size: 11px; color: var(--text2); margin-top: 4px; font-style: italic; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .nifty-strip { justify-content: center; }
    .price { font-size: 18px; }
    .tabs { overflow-x: auto; }
    .tab { white-space: nowrap; padding: 8px 14px; font-size: 13px; }
    .mf-metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="nifty-strip" class="nifty-strip" style="display:none"></div>
<div id="market-banner" class="market-banner" style="display:none"></div>

<div class="container">
  <div id="timestamp" class="timestamp"></div>
  <div id="loading" class="loading"><span class="spinner"></span>Loading stock data...</div>

  <div id="content" style="display:none">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('stocks')">Stocks</div>
      <div class="tab" onclick="switchTab('mf')">Mutual Funds</div>
    </div>

    <div id="tab-stocks" class="tab-content active">
      <h2>Active Positions</h2>
      <div id="active-grid" class="grid"></div>

      <h2>Swing Watchlist</h2>
      <div id="swing-grid" class="grid"></div>

      <h2>PEG Watchlist</h2>
      <div id="peg-grid" class="grid"></div>
    </div>

    <div id="tab-mf" class="tab-content">
      <div id="mf-loading" class="loading"><span class="spinner"></span>Loading mutual fund data...</div>
      <div id="mf-content" style="display:none">
        <div id="mf-summary" class="mf-summary"></div>
        <h2>Holdings & Lumpsum Signals</h2>
        <div id="mf-grid"></div>
      </div>
    </div>
  </div>
</div>

<script>
const INR = v => v != null ? '\u20B9' + Number(v).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '\u2014';
const PCT = v => v != null ? (v >= 0 ? '+' : '') + v.toFixed(2) + '%' : '\u2014';
const changeCls = v => v > 0 ? 'change-up' : v < 0 ? 'change-down' : 'change-neutral';
const rsiCls = v => v == null ? '' : v < 45 ? 'rsi-green' : v > 60 ? 'rsi-red' : 'rsi-yellow';
const signalCls = s => 'signal signal-' + s.toLowerCase().replace(/\s+/g, '-');
const smaCls = (price, sma) => price > sma ? 'sma-above' : 'sma-below';

function smaLabel(price, sma) {
  if (!sma) return '\u2014';
  const pct = ((price - sma) / sma * 100).toFixed(1);
  return (price > sma ? 'Above ' : 'Below ') + Math.abs(pct) + '%';
}

function buildCard(s, type) {
  let metricsHtml = `
    <div class="metric"><span class="metric-label">52W High</span><span class="metric-value">${INR(s.high_52w)}</span></div>
    <div class="metric"><span class="metric-label">52W Low</span><span class="metric-value">${INR(s.low_52w)}</span></div>
    <div class="metric"><span class="metric-label">% from High</span><span class="metric-value ${changeCls(s.pct_from_high)}">${PCT(s.pct_from_high)}</span></div>
    <div class="metric"><span class="metric-label">RSI (14)</span><span class="metric-value ${rsiCls(s.rsi)}">${s.rsi != null ? s.rsi.toFixed(1) : '\u2014'}</span></div>
    <div class="metric"><span class="metric-label">vs 50 SMA</span><span class="metric-value ${s.sma_50 ? smaCls(s.price, s.sma_50) : ''}">${smaLabel(s.price, s.sma_50)}</span></div>
    <div class="metric"><span class="metric-label">vs 200 SMA</span><span class="metric-value ${s.sma_200 ? smaCls(s.price, s.sma_200) : ''}">${smaLabel(s.price, s.sma_200)}</span></div>`;

  // PEG ratio — shown for all stocks that have it
  if (s.peg != null) metricsHtml += `<div class="metric"><span class="metric-label">PEG Ratio</span><span class="metric-value" style="color:${s.peg < 1 ? 'var(--green)' : s.peg < 1.5 ? 'var(--yellow)' : 'var(--red)'}">${s.peg.toFixed(2)}</span></div>`;

  if (type === 'active') {
    if (s.entry) metricsHtml += `<div class="metric"><span class="metric-label">Entry</span><span class="metric-value">${INR(s.entry)}</span></div>`;
    if (s.avg_cost) metricsHtml += `<div class="metric"><span class="metric-label">Avg Cost</span><span class="metric-value">${INR(s.avg_cost)}</span></div>`;
    if (s.qty) metricsHtml += `<div class="metric"><span class="metric-label">Qty</span><span class="metric-value">${s.qty}</span></div>`;
    if (s.sl) metricsHtml += `<div class="metric"><span class="metric-label">SL</span><span class="metric-value" style="color:var(--red)">${INR(s.sl)}</span></div>`;
    if (s.t1) metricsHtml += `<div class="metric"><span class="metric-label">T1</span><span class="metric-value" style="color:var(--green)">${INR(s.t1)}</span></div>`;
    if (s.t2) metricsHtml += `<div class="metric"><span class="metric-label">T2</span><span class="metric-value" style="color:var(--green)">${INR(s.t2)}</span></div>`;
    if (s.add_alert) metricsHtml += `<div class="metric"><span class="metric-label">Add Alert</span><span class="metric-value" style="color:var(--teal)">${INR(s.add_alert)}</span></div>`;
    if (s.note) metricsHtml += `<div class="metric" style="grid-column:1/-1"><span class="metric-label">Broker</span><span class="metric-value" style="font-size:11px">${s.note}</span></div>`;
  } else if (type === 'swing') {
    if (s.entry_low && s.entry_high) metricsHtml += `<div class="metric"><span class="metric-label">Entry Zone</span><span class="metric-value">${INR(s.entry_low)} - ${INR(s.entry_high)}</span></div>`;
    if (s.sl) metricsHtml += `<div class="metric"><span class="metric-label">SL</span><span class="metric-value" style="color:var(--red)">${INR(s.sl)}</span></div>`;
    if (s.t1) metricsHtml += `<div class="metric"><span class="metric-label">T1</span><span class="metric-value" style="color:var(--green)">${INR(s.t1)}</span></div>`;
  }

  let pnlHtml = '';
  if (type === 'active' && s.pnl_abs != null) {
    const cls = s.pnl_abs >= 0 ? 'pnl-positive' : 'pnl-negative';
    const totalPnl = s.qty ? INR(s.pnl_abs) : INR(s.pnl_abs) + '/unit';
    pnlHtml = `<div class="pnl-row ${cls}">
      <span>P&L: ${totalPnl}</span><span>${PCT(s.pnl_pct)}</span>
    </div>`;
  }

  return `<div class="card">
    <div class="card-header">
      <div><div class="card-symbol">${s.symbol}</div><div class="card-name">${s.name}</div></div>
      <span class="${signalCls(s.signal)}">${s.signal}</span>
    </div>
    <div class="price-row">
      <span class="price">${INR(s.price)}</span>
      <span class="${changeCls(s.change_pct)}">${PCT(s.change_pct)}</span>
    </div>
    <div class="metrics">${metricsHtml}</div>
    ${pnlHtml}
  </div>`;
}

async function fetchData() {
  try {
    const res = await fetch('/api/stocks');
    const data = await res.json();

    // Check if data is empty (yfinance failed on server)
    if (data.active.length === 0 && data.swing.length === 0 && data.peg.length === 0) {
      document.getElementById('loading').innerHTML = `
        <div style="color:var(--yellow)">
          <p style="font-size:18px;margin-bottom:8px">Data fetch in progress...</p>
          <p style="font-size:13px;color:var(--text2)">Yahoo Finance may be slow to respond. Auto-retrying in 30s.</p>
          <p style="font-size:12px;color:var(--text2);margin-top:12px">
            Debug: <a href="/api/stocks" style="color:var(--blue)" target="_blank">/api/stocks</a>
            &mdash; Timestamp: ${data.timestamp}
          </p>
        </div>`;
      setTimeout(fetchData, 30000);
      return;
    }

    // Nifty strip
    if (data.nifty) {
      const n = data.nifty;
      const strip = document.getElementById('nifty-strip');
      strip.style.display = 'flex';
      strip.innerHTML = `
        <span class="label">NIFTY 50</span>
        <span class="value">${n.level.toLocaleString('en-IN')}</span>
        <span class="change ${changeCls(n.change_pct)}">${PCT(n.change_pct)}</span>
        <span class="mood-badge mood-${n.mood}">${n.mood}</span>
        ${n.sma_200 ? `<span style="font-size:12px;color:var(--text2)">200 SMA: ${n.sma_200.toLocaleString('en-IN')}</span>` : ''}`;
    }

    // Market banner
    const banner = document.getElementById('market-banner');
    banner.style.display = 'block';
    if (data.market_open) {
      banner.className = 'market-banner banner-open';
      banner.textContent = 'Market Open \u2014 Auto-refreshing every 60s';
    } else {
      banner.className = 'market-banner banner-closed';
      banner.textContent = 'Market Closed \u2014 Showing last available prices';
    }

    // Timestamp
    document.getElementById('timestamp').textContent = 'Last updated: ' + data.timestamp;

    // Cards
    document.getElementById('active-grid').innerHTML = data.active.map(s => buildCard(s, 'active')).join('');
    document.getElementById('swing-grid').innerHTML = data.swing.map(s => buildCard(s, 'swing')).join('');
    document.getElementById('peg-grid').innerHTML = data.peg.map(s => buildCard(s, 'peg')).join('');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (e) {
    console.error('Fetch error:', e);
    document.getElementById('loading').innerHTML = '<span style="color:var(--red)">Failed to load data. Retrying...</span>';
  }
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab-content#tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'mf' && !mfLoaded) fetchMF();
}

// ── Mutual Funds ──
let mfLoaded = false;

const INRL = v => '\u20B9' + Number(v).toLocaleString('en-IN', {maximumFractionDigits: 0});

function mfSignalCls(s) {
  const map = {'DEPLOY NOW': 'signal-deploy-now', 'GOOD ENTRY': 'signal-good-entry',
    'SIP ONLY': 'signal-sip-only', 'WAIT': 'signal-wait-mf'};
  return 'signal ' + (map[s] || 'signal-sip-only');
}

function buildMFCard(f) {
  const pnlCls = f.pnl_pct >= 0 ? 'pnl-positive' : 'pnl-negative';
  return `<div class="mf-card">
    <div class="mf-header">
      <div>
        <div class="mf-name">${f.name}</div>
        <div class="mf-category">${f.category} ${f.platform !== '\u2014' ? '\u2022 ' + f.platform : ''}</div>
      </div>
      <div style="text-align:right">
        <span class="${mfSignalCls(f.signal)}">${f.signal}</span>
        <div class="signal-reason">${f.signal_reason}</div>
      </div>
    </div>
    <div class="mf-metrics">
      <div class="mf-metric">
        <div class="mf-metric-label">NAV</div>
        <div class="mf-metric-value">${f.nav ? '\u20B9' + f.nav.toFixed(2) : '\u2014'}</div>
      </div>
      <div class="mf-metric">
        <div class="mf-metric-label">Invested</div>
        <div class="mf-metric-value">${INRL(f.invested)}</div>
      </div>
      <div class="mf-metric">
        <div class="mf-metric-label">Current</div>
        <div class="mf-metric-value">${INRL(f.current_val)}</div>
      </div>
      <div class="mf-metric">
        <div class="mf-metric-label">P&L</div>
        <div class="mf-metric-value ${f.pnl_pct >= 0 ? 'change-up' : 'change-down'}">${INRL(f.pnl_abs)} (${PCT(f.pnl_pct)})</div>
      </div>
      <div class="mf-metric">
        <div class="mf-metric-label">Weight</div>
        <div class="mf-metric-value">${f.weight_pct.toFixed(1)}%</div>
      </div>
      <div class="mf-metric">
        <div class="mf-metric-label">Units</div>
        <div class="mf-metric-value">${f.units ? f.units.toFixed(1) : '\u2014'}</div>
      </div>
    </div>
  </div>`;
}

async function fetchMF() {
  try {
    const res = await fetch('/api/mutualfunds');
    const data = await res.json();

    const s = data;
    const pnlCls = s.overall_pnl_pct >= 0 ? 'change-up' : 'change-down';
    document.getElementById('mf-summary').innerHTML = `
      <div class="mf-summary-item">
        <div class="mf-summary-label">Total Invested</div>
        <div class="mf-summary-value">${INRL(s.total_invested)}</div>
      </div>
      <div class="mf-summary-item">
        <div class="mf-summary-label">Current Value</div>
        <div class="mf-summary-value">${INRL(s.total_current)}</div>
      </div>
      <div class="mf-summary-item">
        <div class="mf-summary-label">Overall Return</div>
        <div class="mf-summary-value ${pnlCls}">${PCT(s.overall_pnl_pct)}</div>
      </div>
      ${s.nifty ? `<div class="mf-summary-item">
        <div class="mf-summary-label">Nifty RSI</div>
        <div class="mf-summary-value" style="color:${s.nifty.rsi < 40 ? 'var(--green)' : s.nifty.rsi > 60 ? 'var(--red)' : 'var(--yellow)'}">${s.nifty.rsi.toFixed(1)}</div>
      </div>
      <div class="mf-summary-item">
        <div class="mf-summary-label">Nifty vs 200 SMA</div>
        <div class="mf-summary-value" style="color:${s.nifty.level < s.nifty.sma_200 ? 'var(--red)' : 'var(--green)'}">
          ${s.nifty.level < s.nifty.sma_200 ? 'Below' : 'Above'} ${Math.abs(((s.nifty.level - s.nifty.sma_200) / s.nifty.sma_200) * 100).toFixed(1)}%
        </div>
      </div>` : ''}`;

    document.getElementById('mf-grid').innerHTML = data.funds.map(buildMFCard).join('');

    document.getElementById('mf-loading').style.display = 'none';
    document.getElementById('mf-content').style.display = 'block';
    mfLoaded = true;
  } catch (e) {
    console.error('MF fetch error:', e);
    document.getElementById('mf-loading').innerHTML = '<span style="color:var(--red)">Failed to load MF data.</span>';
  }
}

fetchData();
setInterval(fetchData, 60000);
</script>
</body>
</html>
